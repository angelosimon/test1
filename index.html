<html lang="ru">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sun Federation — SunShield</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #1a2235;
  color: #e0e8f0;
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse 120% 60% at 50% -10%, rgba(30,60,120,0.5) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}

/* NAV */
nav {
  position: relative; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; height: 56px;
  background: rgba(12,17,32,0.98);
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.nav-brand { font-size: 16px; font-weight: 800; color: #fff; }
.nav-links { display: flex; gap: 4px; }
.nav-links a {
  color: rgba(255,255,255,0.5); font-size: 13px; font-weight: 600;
  padding: 6px 14px; border-radius: 8px; transition: all .15s; text-decoration: none;
}
.nav-links a:hover { color: #fff; background: rgba(255,255,255,0.07); }
.btn-site {
  background: #2563eb; color: #fff; border: none;
  padding: 7px 18px; border-radius: 9px; font-size: 13px;
  font-weight: 700; cursor: pointer; font-family: inherit;
  text-decoration: none; transition: background .15s;
}
.btn-site:hover { background: #1d4ed8; }

/* TOP BUTTONS */
.top-buttons {
  position: relative; z-index: 10;
  padding: 20px 32px 0; display: flex; gap: 8px;
}
.top-btn {
  padding: 8px 20px; border-radius: 10px; font-size: 13px;
  font-weight: 800; cursor: pointer; font-family: inherit; border: none; transition: all .15s;
}
.top-btn.active { background: #2563eb; color: #fff; }
.top-btn:not(.active) { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.5); }
.top-btn:not(.active):hover { background: rgba(255,255,255,0.12); color: #fff; }

/* LAYOUT */
.layout {
  position: relative; z-index: 10;
  display: flex; gap: 0; padding: 20px 32px 40px;
  max-width: 1400px; margin: 0 auto; align-items: flex-start;
}

/* SIDEBAR */
.sidebar { width: 220px; flex-shrink: 0; margin-right: 24px; }
.sidebar-title { font-size: 22px; font-weight: 900; color: #fff; margin-bottom: 14px; padding-left: 4px; }
.cat-list { display: flex; flex-direction: column; gap: 4px; }
.cat-btn {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: 12px; border: none;
  color: rgba(255,255,255,0.65); font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: inherit; width: 100%; text-align: left;
  transition: all .15s; background: transparent;
}
.cat-btn:hover { background: rgba(255,255,255,0.06); color: #fff; }
.cat-btn.active { background: #2563eb; color: #fff; }
.cat-icon-wrap {
  width: 30px; height: 30px; border-radius: 8px;
  background: rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; overflow: hidden;
}
.cat-btn.active .cat-icon-wrap { background: rgba(255,255,255,0.2); }
.cat-icon-wrap img {
  width: 22px; height: 22px; image-rendering: pixelated; object-fit: contain;
}

/* SEARCH */
.search-wrap { margin-bottom: 16px; }
.search-box { position: relative; }
.search-box input {
  width: 100%; background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
  color: #fff; font-size: 14px; font-family: inherit; font-weight: 700;
  padding: 11px 16px 11px 44px; outline: none; transition: border-color .2s;
}
.search-box input::placeholder { color: rgba(255,255,255,0.25); font-weight: 600; }
.search-box input:focus { border-color: #2563eb; background: rgba(255,255,255,0.09); }
.s-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); opacity: 0.35; }
.search-clear {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: rgba(255,255,255,0.4); cursor: pointer;
  font-size: 16px; display: none; padding: 4px 6px;
}
.search-clear:hover { color: #fff; }

/* MAIN */
.shop-main { flex: 1; min-width: 0; }

/* GRID */
.items-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
  gap: 10px;
}

/* CARD */
.item-card {
  background: #1e2d45;
  border-radius: 14px; overflow: hidden;
  display: flex; flex-direction: column;
  transition: transform .15s, box-shadow .15s; cursor: default;
}
.item-card:hover { transform: translateY(-3px); box-shadow: 0 14px 36px rgba(0,0,0,0.6); }

.item-name-top {
  padding: 10px 10px 4px;
  font-size: 11.5px; font-weight: 800; color: #c8d8f0;
  text-align: center; line-height: 1.3;
  min-height: 38px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.item-name-top .item-qty-label {
  font-size: 10px; font-weight: 600; color: rgba(200,216,240,0.4); margin-top: 1px;
}

.item-img-area {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 10px; min-height: 96px; background: #1e2d45;
}
.item-img-area img {
  width: 72px; height: 72px;
  image-rendering: pixelated; image-rendering: crisp-edges;
  object-fit: contain;
  filter: drop-shadow(0 3px 8px rgba(0,0,0,0.6));
}
.item-img-area .img-placeholder {
  width: 72px; height: 72px;
  background: rgba(255,255,255,0.04); border-radius: 10px;
}

.item-price-bar {
  background: #243450;
  padding: 10px 12px; text-align: center;
  font-size: 18px; font-weight: 900; color: #fff; letter-spacing: 0.01em;
}
.item-price-bar .cur { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.45); margin-left: 3px; }

/* NO RESULTS */
.no-results { grid-column:1/-1; text-align:center; padding:60px 20px; color:rgba(255,255,255,0.25); font-size:15px; font-weight:700; }

/* FOOTER */
footer {
  position: relative; z-index: 10;
  background: rgba(10,14,25,0.85); border-top: 1px solid rgba(255,255,255,0.06);
  padding: 26px 32px; display: flex; align-items: center; justify-content: space-between;
}
.footer-brand { font-size: 14px; font-weight: 800; color: rgba(255,255,255,0.5); }
.footer-copy { font-size: 12px; color: rgba(255,255,255,0.2); }

@media(max-width:800px){
  .layout { flex-direction:column; padding:16px; }
  .sidebar { width:100%; margin-right:0; margin-bottom:16px; }
  .cat-list { flex-direction:row; flex-wrap:wrap; }
  nav { padding:0 16px; } .nav-links { display:none; }
  .top-buttons { padding:14px 16px 0; }
}
</style>

let activeCategory = 'all';
let searchQuery = '';

function renderCategories() {
  document.getElementById('catList').innerHTML = CATEGORIES.map(c => `
    <button class="cat-btn ${c.id===activeCategory?'active':''}" onclick="setCategory('${c.id}')">
      <div class="cat-icon-wrap">
        <img src="${CAT_IMG[c.id]||''}" alt="" onerror="this.style.display='none'">
      </div>
      ${c.label}
    </button>
  `).join('');
}

function setCategory(id) {
  activeCategory = id;
  renderCategories();
  renderItems();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  searchQuery = '';
  document.getElementById('searchClear').style.display = 'none';
  renderItems();
}

function renderItems() {
  const q = searchQuery.toLowerCase();
  const filtered = ITEMS.filter(item => {
    return (activeCategory==='all'||item.cat===activeCategory) &&
           (!q||item.name.toLowerCase().includes(q));
  });

  if (!filtered.length) {
    document.getElementById('itemsGrid').innerHTML = '<div class="no-results">Ничего не найдено</div>';
    return;
  }

  document.getElementById('itemsGrid').innerHTML = filtered.map(item => {
    const qtyLabel = (item.qty && item.qty !== '1 шт.') ? `<span class="item-qty-label">${item.qty}</span>` : '';
    return `<div class="item-card">
      <div class="item-name-top">${item.name}${qtyLabel}</div>
      <div class="item-img-area">
        <img src="${IMG[item.img]||''}" alt="${item.name}" onerror="this.outerHTML='<div class=img-placeholder></div>'">
      </div>
      <div class="item-price-bar">${item.price}<span class="cur"> вон</span></div>
    </div>`;
  }).join('');
}

document.getElementById('searchInput').addEventListener('input', function() {
  searchQuery = this.value;
  document.getElementById('searchClear').style.display = this.value?'block':'none';
  renderItems();
});

document.querySelectorAll('.top-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.top-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

renderCategories();
renderItems();
</script>
