<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Торговая федерация</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
/* ====== БАЗА ====== */
:root{
  --bg:#0e141d;
  --panel:#1a2432;
  --panel2:#202d3e;
  --blue:#2484ff;
  --blue-soft:rgba(36,132,255,.15);
  --border:rgba(255,255,255,.06);
  --text:#e5ecff;
  --text2:rgba(229,236,255,.55);
  --text3:rgba(229,236,255,.32);
  --radius:12px;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:"Inter",sans-serif}
html,body{height:100%}
body{background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center;overflow:hidden}

/* ====== ЦЕНТРАЛЬНАЯ КАРТОЧКА ====== */
.wrap{width:1020px;height:90vh;display:flex;border:1px solid var(--border);border-radius:var(--radius);background:var(--panel);overflow:hidden;box-shadow:0 0 0 1px rgba(0,0,0,.4),0 20px 40px rgba(0,0,0,.35)}

/* ====== САЙДБАР ====== */
.sidebar{width:200px;padding:24px 18px 24px 20px;background:var(--panel2);display:flex;flex-direction:column;gap:10px;overflow-y:auto}
.sidebar h3{font-size:15px;font-weight:700;margin-bottom:6px}
.cat{display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid transparent;border-radius:var(--radius);cursor:pointer;transition:.15s}
.cat img{width:20px;height:20px;image-rendering:pixelated}
.cat span{font-size:14px;font-weight:500;color:var(--text2)}
.cat:hover{background:var(--blue-soft)}
.cat.active{background:var(--blue-soft);border-color:var(--blue);}
.cat.active span{color:var(--text)}

/* ====== ОСНОВНАЯ ОБЛАСТЬ ====== */
.content{flex:1;display:flex;flex-direction:column;padding:24px 24px 24px 0}
.tabs{display:flex;gap:8px;margin-bottom:18px}
.tab{padding:6px 14px;border-radius:var(--radius);font-size:13px;font-weight:600;border:1px solid transparent;background:var(--panel2);color:var(--text2);cursor:pointer;transition:.15s}
.tab.active{background:var(--blue);color:#fff}
.tab:hover{border-color:var(--blue)}
.head{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.head h2{font-size:18px;font-weight:700;flex:1}
.search{position:relative;flex:1}
.search input{width:100%;padding:8px 38px 8px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--panel2);color:var(--text);font-size:14px}
.search svg{position:absolute;right:12px;top:50%;transform:translateY(-50%);opacity:.4}
.grid{flex:1;overflow-y:auto;padding-right:4px}
.items{display:grid;grid-template-columns:repeat(auto-fill,minmax(162px,1fr));gap:10px}

/* ====== КАРТОЧКА ТОВАРА ====== */
.card{background:var(--panel2);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);display:flex;flex-direction:column;transition:.18s}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.35)}
.card .name{font-size:12.5px;font-weight:600;padding:10px;text-align:center;line-height:1.35;min-height:34px}
.card .qty{display:block;font-size:10px;font-weight:500;color:var(--text3);margin-top:2px}
.card .img{padding:20px 10px;display:flex;justify-content:center;align-items:center;background:rgba(36,132,255,.05)}
.card .img img{width:60px;height:60px;image-rendering:pixelated;filter:drop-shadow(0 2px 6px rgba(0,0,0,.4))}
.card .price{background:var(--panel);padding:8px 6px;font-size:13px;font-weight:700;text-align:center;border-top:1px solid var(--border)}
.card .price span{font-size:11px;font-weight:600;color:var(--blue)}

/* ====== СКРОЛЛ ====== */
.sidebar::-webkit-scrollbar,
.grid::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb,
.grid::-webkit-scrollbar-thumb{background:var(--blue);border-radius:8px}

/* ====== АДАПТИВ ====== */
@media(max-width:1020px){.wrap{width:95vw}}
@media(max-width:720px){.wrap{flex-direction:column;height:95vh}.sidebar{width:100%;flex-direction:row;overflow-x:auto}.content{padding:16px}}
</style>
</head>
<body>

<div class="wrap">
  <!--  САЙДБАР  -->
  <aside class="sidebar" id="catBox">
    <h3>Категории</h3>
  </aside>

  <!--  КОНТЕНТ  -->
  <section class="content">
    <!-- tabs -->
    <div class="tabs">
      <button class="tab active" onclick="setTab('rec',this)">Рекомендуемые</button>
      <button class="tab" onclick="setTab('min',this)">Минимальные</button>
    </div>
    <!-- header -->
    <div class="head">
      <h2>Торговая федерация</h2>
      <div class="search">
        <input type="text" id="search" placeholder="Найти предмет">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16" y2="16"/></svg>
      </div>
    </div>
    <!-- items -->
    <div class="grid">
      <div class="items" id="grid"></div>
    </div>
  </section>
</div>

<script>
/*  ----------  ДАННЫЕ  ----------  */
const G='https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.21/assets/minecraft/textures/';
const I=G+'item/',B=G+'block/';
const T={sword_netherite:I+'netherite_sword.png',axe_netherite:I+'netherite_axe.png',trident:I+'trident.png',mangrove:B+'mangrove_log.png',chorus:I+'chorus_fruit.png',c_flower:I+'chorus_flower.png',end_rod:I+'end_rod.png',shulker:I+'shulker_shell.png',apple:I+'apple.png',bamboo_block:B+'bamboo_block.png',wood:I+'oak_log.png',golden_apple:I+'golden_apple.png',flower:I+'dandelion.png',leaves:B+'oak_leaves.png',bamboo_plank:B+'bamboo_planks.png',plank:B+'oak_planks.png',ench_apple:I+'enchanted_golden_apple.png',vines:B+'azalea_leaves.png'};

const ITEMS=[
  {name:'Мангровое бревно',qty:'64 шт',price:4,img:'mangrove'},
  {name:'Плод хоруса',qty:'64 шт',price:2,img:'chorus'},
  {name:'Приготовленный плод хоруса',qty:'64 шт',price:3,img:'c_flower'},
  {name:'Стержень энда',qty:'16 шт',price:2,img:'end_rod'},
  {name:'Факеломник',qty:'64 шт',price:2,img:'flower'},
  {name:'Цветок хоруса',qty:'64 шт',price:5,img:'c_flower'},
  {name:'Шалкер',qty:'',price:5,img:'shulker'},
  {name:'Яблоко',qty:'64 шт',price:2,img:'apple'},
  {name:'Блок бамбука',qty:'64 шт',price:4,img:'bamboo_block'},
  {name:'Бревна (все виды)',qty:'64 шт',price:3,img:'wood'},
  {name:'Золотое яблоко',qty:'64 шт',price:5,img:'golden_apple'},
  {name:'Любой цветок',qty:'64 шт',price:1,img:'flower'},
  {name:'Вся листва',qty:'64 шт',price:1,img:'leaves'},
  {name:'Бамбуковые доски',qty:'64 шт',price:2,img:'bamboo_plank'},
  {name:'Все типы досок',qty:'64 шт',price:1,img:'plank'},
  {name:'Зачар. золотое яблоко',qty:'64 шт',price:12,img:'ench_apple'}
];

/*  ----------  КАТЕГОРИИ  ----------  */
const CATS=[
  {id:'all',label:'Все',icon:T.sword_netherite},
  {id:'decor',label:'Декорации',icon:T.flower},
  {id:'tool',label:'Инструменты',icon:T.axe_netherite},
  {id:'weapon',label:'Оружие',icon:T.sword_netherite},
  {id:'mech',label:'Механизмы',icon:T.end_rod},
  {id:'enchant',label:'Зачарование',icon:T.ench_apple},
  {id:'armor',label:'Броня',icon:T.shulker},
  {id:'build',label:'Строительство',icon:T.plank},
  {id:'ore',label:'Руда',icon:T.bamboo_block},
  {id:'brew',label:'Зельеварение',icon:T.chorus},
  {id:'transport',label:'Транспорт',icon:T.trident},
  {id:'food',label:'Еда',icon:T.apple},
  {id:'misc',label:'Прочее',icon:T.leaves}
];

/*  ----------  РЕНДЕР  ----------  */
let activeCat='all',search='',sort='rec';

function $(sel){return document.querySelector(sel)}
function setTab(m,b){
  sort=m;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  b.classList.add('active');render()
}
function setCat(id){
  activeCat=id;document.querySelectorAll('.cat').forEach(c=>c.classList.remove('active'));
  $('#cat_'+id).classList.add('active');render()
}

function renderCats(){
  $('#catBox').insertAdjacentHTML('beforeend',
    CATS.map(c=>`<div class="cat${c.id==='all'?' active':''}" id="cat_${c.id}" onclick="setCat('${c.id}')">
      <img src="${c.icon}" alt=""><span>${c.label}</span></div>`).join(''));
}
function render(){
  const q=search.toLowerCase();
  let list=ITEMS.filter(i=>(activeCat==='all'||i.cat===activeCat)&&(!q||i.name.toLowerCase().includes(q)));
  if(sort==='min')list=list.slice().sort((a,b)=>a.price-b.price);
  $('#grid').innerHTML=list.map(it=>`
    <div class="card">
      <div class="name">${it.name}${it.qty?`<span class="qty">${it.qty}</span>`:''}</div>
      <div class="img"><img src="${T[it.img]||''}" alt=""></div>
      <div class="price">от ${it.price} <span>ВОН</span></div>
    </div>`).join('');
}
$('#search').addEventListener('input',e=>{search=e.target.value;render()});
renderCats();render();
</script>
</body>
</html>
