<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sun Federation — SunShield Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0f1623;
  --bg2:      #141d2e;
  --bg3:      #1a2540;
  --card:     #192035;
  --card2:    #1f2a42;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.13);
  --accent:   #3b82f6;
  --accent2:  #1d4ed8;
  --gold:     #f5a623;
  --text:     #dde8f8;
  --text2:    rgba(180,205,240,0.55);
  --text3:    rgba(140,170,210,0.3);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 100% 50% at 50% 0%, rgba(59,130,246,0.08) 0%, transparent 65%),
    radial-gradient(ellipse 60% 40% at 90% 80%, rgba(99,60,180,0.05) 0%, transparent 50%);
}

/* ─── NAV ─────────────────────────────── */
nav {
  position: sticky; top:0; z-index:300;
  height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px;
  background: rgba(10,14,24,0.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
.nav-logo {
  display:flex; align-items:center; gap:10px;
}
.nav-logo-mark {
  width:32px; height:32px; border-radius:9px;
  background: linear-gradient(135deg,#f5a623 0%,#ef4444 100%);
  display:flex; align-items:center; justify-content:center;
  font-size:16px; font-weight:900; color:#fff; font-family:'Rajdhani',sans-serif;
  box-shadow: 0 0 16px rgba(245,166,35,0.35);
}
.nav-logo-text {
  font-family: 'Rajdhani', sans-serif;
  font-size:17px; font-weight:700; color:#fff; letter-spacing:.04em;
}
.nav-logo-badge {
  font-size:10px; font-weight:700; color:rgba(255,255,255,0.4);
  background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
  border-radius:5px; padding:2px 7px; letter-spacing:.05em;
}
.nav-links { display:flex; gap:2px; }
.nav-links a {
  color:var(--text2); font-size:13px; font-weight:700;
  padding:5px 12px; border-radius:8px; text-decoration:none; transition:all .15s;
}
.nav-links a:hover { color:var(--text); background:rgba(255,255,255,0.05); }
.nav-btn {
  background: linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff; border:none; padding:7px 18px; border-radius:9px;
  font-size:12px; font-weight:800; cursor:pointer; font-family:inherit;
  text-decoration:none; letter-spacing:.03em;
  box-shadow: 0 4px 14px rgba(59,130,246,0.3);
  transition: opacity .15s, box-shadow .15s;
}
.nav-btn:hover { opacity:.88; box-shadow:0 4px 20px rgba(59,130,246,0.45); }

/* ─── HERO STRIP ───────────────────────── */
.hero-strip {
  background: linear-gradient(90deg, rgba(29,78,216,0.18) 0%, rgba(59,130,246,0.08) 50%, transparent 100%);
  border-bottom: 1px solid var(--border);
  padding: 20px 32px;
  display:flex; align-items:center; justify-content:space-between; gap:20px;
}
.hero-strip-left h1 {
  font-family:'Rajdhani',sans-serif;
  font-size:28px; font-weight:700; color:#fff; letter-spacing:.03em;
  line-height:1.1;
}
.hero-strip-left h1 span { color:var(--accent); }
.hero-strip-left p {
  font-size:13px; color:var(--text2); margin-top:4px;
}
.hero-stats { display:flex; gap:12px; }
.hstat {
  background:rgba(255,255,255,0.04); border:1px solid var(--border);
  border-radius:10px; padding:10px 18px; text-align:center;
}
.hstat-n {
  font-family:'Rajdhani',sans-serif;
  font-size:22px; font-weight:700; color:var(--gold); line-height:1;
}
.hstat-l { font-size:10px; color:var(--text3); letter-spacing:.06em; text-transform:uppercase; margin-top:3px; }

/* ─── TABS ─────────────────────────────── */
.top-tabs { padding:14px 32px 0; display:flex; gap:8px; }
.tab-btn {
  padding:7px 18px; border-radius:9px; font-size:12px; font-weight:800;
  cursor:pointer; font-family:'Rajdhani',sans-serif; border:none; transition:all .15s;
  letter-spacing:.04em;
}
.tab-btn.active { background: linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; box-shadow:0 3px 12px rgba(59,130,246,0.35); }
.tab-btn:not(.active) { background:rgba(255,255,255,0.05); color:var(--text2); border:1px solid var(--border); }
.tab-btn:not(.active):hover { background:rgba(255,255,255,0.08); color:var(--text); }

/* ─── LAYOUT ───────────────────────────── */
.layout {
  display:flex; padding:16px 32px 48px;
  max-width:1440px; margin:0 auto; gap:0; align-items:flex-start;
}

/* ─── SIDEBAR ──────────────────────────── */
.sidebar { width:208px; flex-shrink:0; margin-right:20px; }
.sidebar-title {
  font-family:'Rajdhani',sans-serif;
  font-size:18px; font-weight:700; color:#fff;
  letter-spacing:.06em; text-transform:uppercase;
  margin-bottom:10px; padding-left:4px;
}
.cat-list { display:flex; flex-direction:column; gap:2px; }
.cat-btn {
  display:flex; align-items:center; gap:9px;
  padding:7px 10px; border-radius:10px; border:none;
  color:var(--text2); font-size:13px; font-weight:700;
  cursor:pointer; font-family:inherit; width:100%; text-align:left;
  transition:all .15s; background:transparent; position:relative;
}
.cat-btn:hover { background:rgba(255,255,255,0.05); color:var(--text); }
.cat-btn.active {
  background: linear-gradient(90deg,rgba(59,130,246,0.18),rgba(59,130,246,0.05));
  color:#fff;
  border-left:2px solid var(--accent);
}
.cat-btn.active::before {
  content:'';
  position:absolute; left:0; top:0; bottom:0; width:2px;
  background:var(--accent); border-radius:0 2px 2px 0;
}
.cat-ico {
  width:26px; height:26px; border-radius:7px;
  background:rgba(255,255,255,0.07);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.cat-btn.active .cat-ico { background:rgba(59,130,246,0.22); }
.cat-ico img { width:18px; height:18px; image-rendering:pixelated; object-fit:contain; }
.cat-count {
  margin-left:auto; font-size:10px; font-weight:700; color:var(--text3);
  background:rgba(255,255,255,0.05); border-radius:5px; padding:1px 6px;
}
.cat-btn.active .cat-count { background:rgba(59,130,246,0.2); color:rgba(147,197,253,0.7); }

/* ─── SEARCH ───────────────────────────── */
.search-row { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.search-box { position:relative; flex:1; }
.search-box input {
  width:100%; background:rgba(255,255,255,0.05);
  border:1px solid var(--border2); border-radius:11px;
  color:#fff; font-size:13px; font-family:inherit; font-weight:700;
  padding:10px 36px 10px 40px; outline:none; transition:all .2s;
}
.search-box input::placeholder { color:var(--text3); }
.search-box input:focus { border-color:var(--accent); background:rgba(59,130,246,0.06); box-shadow:0 0 0 3px rgba(59,130,246,0.1); }
.s-ico { position:absolute; left:13px; top:50%; transform:translateY(-50%); opacity:.35; pointer-events:none; }
.s-clear { position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text2); cursor:pointer; font-size:14px; display:none; padding:2px 5px; }
.items-count { font-size:11px; font-weight:800; color:var(--text3); white-space:nowrap; font-family:'Rajdhani',sans-serif; letter-spacing:.04em; }

/* ─── SECTION HEADER ───────────────────── */
.section-header {
  display:flex; align-items:center; gap:10px; margin-bottom:12px;
}
.section-header-title {
  font-family:'Rajdhani',sans-serif; font-size:16px; font-weight:700;
  color:#fff; letter-spacing:.05em; text-transform:uppercase;
}
.section-header-line {
  flex:1; height:1px; background:linear-gradient(90deg,var(--border2),transparent);
}

/* ─── MAIN ─────────────────────────────── */
.shop-main { flex:1; min-width:0; }
.items-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(148px,1fr));
  gap:8px;
}

/* ─── CARD ─────────────────────────────── */
.item-card {
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius:14px; overflow:hidden;
  display:flex; flex-direction:column;
  transition:transform .18s cubic-bezier(.2,.8,.2,1), box-shadow .18s, border-color .18s;
  position:relative;
}
.item-card::after {
  content:'';
  position:absolute; inset:0; border-radius:14px;
  background:linear-gradient(180deg,rgba(255,255,255,0.03) 0%,transparent 50%);
  pointer-events:none;
}
.item-card:hover {
  transform:translateY(-4px) scale(1.01);
  box-shadow:0 14px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(59,130,246,0.2);
  border-color:rgba(59,130,246,0.25);
}

.card-top-bar {
  height:2px;
  background:linear-gradient(90deg,transparent,rgba(59,130,246,0.5),transparent);
  opacity:0; transition:opacity .18s;
}
.item-card:hover .card-top-bar { opacity:1; }

.card-name {
  padding:9px 9px 4px;
  font-size:11px; font-weight:800; color:var(--text);
  text-align:center; line-height:1.3; min-height:32px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
.card-qty {
  font-size:9.5px; font-weight:700; color:var(--text3); margin-top:1px; display:block;
}

.card-img {
  display:flex; align-items:center; justify-content:center;
  padding:8px 6px; min-height:88px;
  background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(59,130,246,0.06) 0%, transparent 70%);
}
.card-img img {
  width:64px; height:64px;
  image-rendering:pixelated; object-fit:contain;
  filter:drop-shadow(0 4px 10px rgba(0,0,0,0.7));
  transition:transform .18s;
}
.item-card:hover .card-img img { transform:scale(1.1) translateY(-2px); }

.card-price {
  background:var(--card2);
  border-top:1px solid rgba(255,255,255,0.05);
  padding:8px 10px; text-align:center;
}
.card-price-num {
  font-family:'Rajdhani',sans-serif;
  font-size:18px; font-weight:700; color:#fff; letter-spacing:.02em; line-height:1;
}
.card-price-cur {
  font-size:10px; font-weight:700; color:var(--gold); margin-left:3px;
  font-family:'Nunito',sans-serif;
}

/* ─── NO RESULTS ───────────────────────── */
.no-results {
  grid-column:1/-1; text-align:center; padding:60px 20px;
  color:var(--text3); font-size:14px; font-weight:700;
}

/* ─── FOOTER ───────────────────────────── */
footer {
  background:rgba(8,12,20,0.9);
  border-top:1px solid var(--border);
  padding:20px 32px;
  display:flex; align-items:center; justify-content:space-between;
}
.footer-brand {
  font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:700;
  color:rgba(255,255,255,0.35); letter-spacing:.04em;
}
.footer-copy { font-size:11px; color:var(--text3); }

@media(max-width:820px){
  .layout{flex-direction:column;padding:12px;}
  .sidebar{width:100%;margin-right:0;margin-bottom:14px;}
  .cat-list{flex-direction:row;flex-wrap:wrap;}
  .cat-count{display:none;}
  nav{padding:0 14px;} .nav-links{display:none;}
  .hero-strip{flex-direction:column;padding:16px;} .hero-stats{flex-wrap:wrap;}
  .top-tabs{padding:10px 14px 0;}
}
</style>
</head>

<footer>

let activeCat='all', search='';

// Count items per category
const catCounts={all:ITEMS.length};
ITEMS.forEach(it=>{ catCounts[it.cat]=(catCounts[it.cat]||0)+1; });

document.getElementById('totalN').textContent=ITEMS.length;

function renderCats(){
  document.getElementById('catList').innerHTML=CATS.map(c=>`
    <button class="cat-btn${c.id===activeCat?' active':''}" onclick="setCat('${c.id}')">
      <div class="cat-ico"><img src="${c.img}" alt="" onerror="this.style.opacity=0"></div>
      ${c.label}
      <span class="cat-count">${catCounts[c.id]||0}</span>
    </button>`).join('');
}

function setCat(id){
  activeCat=id;
  const cat=CATS.find(c=>c.id===id);
  document.getElementById('sTitle').textContent=cat?(cat.label.toUpperCase()+' — ТОВАРЫ'):'ВСЕ ТОВАРЫ';
  renderCats();
  renderItems();
}

function clearSearch(){
  document.getElementById('searchInput').value='';
  search='';
  document.getElementById('sClear').style.display='none';
  renderItems();
}

function renderItems(){
  const q=search.toLowerCase();
  const list=ITEMS.filter(it=>(activeCat==='all'||it.cat===activeCat)&&(!q||it.name.toLowerCase().includes(q)));
  document.getElementById('iCount').textContent=list.length+' ТОВАРОВ';
  if(!list.length){
    document.getElementById('grid').innerHTML='<div class="no-results">Ничего не найдено</div>';
    return;
  }
  document.getElementById('grid').innerHTML=list.map(it=>{
    const url=T[it.img]||'';
    const filt=PTINT[it.img]?` style="filter:${PTINT[it.img]}"`:'';
    const qh=(it.qty&&it.qty!=='1 шт.')?`<span class="card-qty">${it.qty}</span>`:'';
    return`<div class="item-card">
      <div class="card-top-bar"></div>
      <div class="card-name">${it.name}${qh}</div>
      <div class="card-img"><img src="${url}" alt="${it.name}"${filt} loading="lazy"></div>
      <div class="card-price"><span class="card-price-num">${it.price}</span><span class="card-price-cur">вон</span></div>
    </div>`;
  }).join('');
}

document.getElementById('searchInput').addEventListener('input',function(){
  search=this.value;
  document.getElementById('sClear').style.display=this.value?'block':'none';
  renderItems();
});

renderCats();
renderItems();
</script>
