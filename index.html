<title>Sun Federation — SunShield Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e1117;
  --bg2: #141822;
  --bg3: #1a2030;
  --card: #161c28;
  --border: #252d3d;
  --border2: #2e3a50;
  --accent: #4a9eff;
  --accent2: #2563eb;
  --gold: #f5a623;
  --green: #22c55e;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #4a5568;
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Exo 2', sans-serif;
  min-height: 100vh;
  background-image: 
    radial-gradient(ellipse 80% 40% at 50% 0%, rgba(74,158,255,0.07) 0%, transparent 60%),
    url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23253047' fill-opacity='0.15'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}

/* NAV */
nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 40px;
  height: 60px;
  background: rgba(14,17,23,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 200;
}
.nav-brand {
  display: flex; align-items: center; gap: 10px;
  font-size: 16px; font-weight: 800; color: #fff;
  letter-spacing: 0.02em;
}
.nav-brand-icon {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, #f5a623, #ff6b35);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.nav-badge {
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  color: #fff; font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 20px; letter-spacing: 0.05em;
}
.nav-links { display: flex; gap: 4px; }
.nav-links a {
  color: var(--text2); font-size: 13px; font-weight: 500;
  padding: 6px 14px; border-radius: 8px;
  transition: all .15s; text-decoration: none;
}
.nav-links a:hover { color: var(--text); background: var(--bg3); }
.nav-right { display: flex; align-items: center; gap: 10px; }
.btn-nav {
  background: linear-gradient(135deg, var(--accent2), #1d4ed8);
  color: #fff; border: none; padding: 7px 18px;
  border-radius: 9px; font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: inherit; text-decoration: none;
  transition: opacity .15s;
}
.btn-nav:hover { opacity: 0.88; }

/* HERO */
.hero {
  padding: 56px 40px 40px;
  max-width: 1280px; margin: 0 auto;
  display: flex; align-items: center; gap: 48px;
}
.hero-text h1 {
  font-size: 48px; font-weight: 800; line-height: 1.1;
  color: #fff; margin-bottom: 12px;
}
.hero-text h1 span { color: var(--accent); }
.hero-text p { color: var(--text2); font-size: 15px; line-height: 1.6; max-width: 420px; }
.hero-stats {
  display: flex; gap: 20px; margin-top: 24px;
}
.stat {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 20px; text-align: center;
}
.stat-num { font-size: 22px; font-weight: 800; color: var(--accent); font-family: 'JetBrains Mono', monospace; }
.stat-label { font-size: 11px; color: var(--text3); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; }

/* SEARCH */
.search-wrap {
  max-width: 1280px; margin: 0 auto;
  padding: 0 40px 28px;
}
.search-box {
  position: relative;
}
.search-icon {
  position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
  color: var(--text3); font-size: 16px; pointer-events: none;
}
#searchInput {
  width: 100%; background: var(--card);
  border: 1px solid var(--border2); border-radius: 12px;
  color: var(--text); font-size: 14px; font-family: inherit;
  padding: 13px 16px 13px 44px;
  outline: none; transition: border-color .2s;
}
#searchInput::placeholder { color: var(--text3); }
#searchInput:focus { border-color: var(--accent); }
.search-clear {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--text3); cursor: pointer;
  font-size: 18px; display: none; padding: 4px;
}
.search-clear:hover { color: var(--text); }

/* LAYOUT */
.shop-layout {
  max-width: 1280px; margin: 0 auto;
  padding: 0 40px 60px;
  display: flex; gap: 24px;
}

/* SIDEBAR */
.sidebar {
  width: 200px; flex-shrink: 0;
}
.sidebar-title {
  font-size: 11px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: 10px; padding-left: 4px;
}
.cat-list { display: flex; flex-direction: column; gap: 3px; }
.cat-btn {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: 10px;
  border: none; background: transparent;
  color: var(--text2); font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: inherit; width: 100%; text-align: left;
  transition: all .15s;
}
.cat-btn:hover { background: var(--bg3); color: var(--text); }
.cat-btn.active { background: linear-gradient(135deg, rgba(74,158,255,0.18), rgba(37,99,235,0.12)); color: var(--accent); border: 1px solid rgba(74,158,255,0.25); }
.cat-icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }

/* MAIN */
.shop-main { flex: 1; min-width: 0; }
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.section-title-main {
  font-size: 16px; font-weight: 700; color: #fff;
}
.items-count { font-size: 12px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }

.items-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  gap: 10px;
}

/* ITEM CARD */
.item-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  display: flex; flex-direction: column;
  cursor: pointer;
  transition: border-color .2s, transform .15s, box-shadow .2s;
  position: relative;
  overflow: hidden;
}
.item-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  opacity: 0; transition: opacity .2s;
}
.item-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
.item-card:hover::before { opacity: 1; }

.item-badge {
  position: absolute; top: 10px; right: 10px;
  font-size: 9px; font-weight: 700;
  padding: 2px 7px; border-radius: 5px;
  letter-spacing: 0.05em; text-transform: uppercase;
}
.badge-hot { background: rgba(239,68,68,0.18); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
.badge-rare { background: rgba(168,85,247,0.18); color: #c084fc; border: 1px solid rgba(168,85,247,0.3); }
.badge-top { background: rgba(245,166,35,0.18); color: #fbbf24; border: 1px solid rgba(245,166,35,0.3); }

.item-img-wrap {
  width: 64px; height: 64px;
  margin: 0 auto 10px;
  display: flex; align-items: center; justify-content: center;
  image-rendering: pixelated;
  position: relative;
}
.item-img-wrap img {
  width: 56px; height: 56px;
  image-rendering: pixelated;
  filter: drop-shadow(0 2px 8px rgba(74,158,255,0.2));
}
.item-img-wrap .item-emoji {
  font-size: 40px;
  line-height: 1;
}

.item-name {
  font-size: 12px; font-weight: 600; color: var(--text);
  text-align: center; margin-bottom: 3px; line-height: 1.3;
}
.item-qty { font-size: 10px; color: var(--text3); text-align: center; margin-bottom: 10px; }

.item-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: auto;
}
.item-price {
  font-size: 16px; font-weight: 800; color: var(--gold);
  font-family: 'JetBrains Mono', monospace;
}
.item-price span { font-size: 10px; font-weight: 500; color: var(--text3); margin-left: 2px; }
.item-buy-btn {
  background: var(--bg3); border: 1px solid var(--border2);
  color: var(--text2); font-size: 11px; font-weight: 600;
  padding: 5px 10px; border-radius: 7px;
  cursor: pointer; font-family: inherit; transition: all .15s;
}
.item-buy-btn:hover { background: var(--accent2); color: #fff; border-color: var(--accent); }

/* NO RESULTS */
.no-results {
  grid-column: 1/-1;
  text-align: center; padding: 60px 20px; color: var(--text3);
}
.no-results-icon { font-size: 48px; margin-bottom: 12px; }
.no-results h3 { font-size: 16px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }

/* FOOTER */
footer {
  background: var(--bg2);
  border-top: 1px solid var(--border);
  padding: 40px;
}
.footer-inner {
  max-width: 1280px; margin: 0 auto;
  display: flex; justify-content: space-between; align-items: center;
}
.footer-brand { font-size: 14px; font-weight: 700; color: var(--text2); }
.footer-copy { font-size: 12px; color: var(--text3); }

@media(max-width:900px){
  .shop-layout { flex-direction: column; padding: 0 16px 40px; }
  .sidebar { width: 100%; }
  .cat-list { flex-direction: row; flex-wrap: wrap; gap: 6px; }
  .hero { flex-direction: column; padding: 32px 16px 24px; }
  .hero-text h1 { font-size: 32px; }
  .search-wrap { padding: 0 16px 20px; }
  nav { padding: 0 16px; }
  .nav-links { display: none; }
}
</style>
</head>

let activeCategory = 'all';
let searchQuery = '';

function getItemImage(key) {
  const url = IMG[key];
  if (!url) return null;
  return url;
}

function renderCategories() {
  const list = document.getElementById('catList');
  list.innerHTML = CATEGORIES.map(c => `
    <button class="cat-btn ${c.id === activeCategory ? 'active' : ''}" onclick="setCategory('${c.id}')">
      <span class="cat-icon">${c.icon}</span> ${c.label}
    </button>
  `).join('');
}

function setCategory(id) {
  activeCategory = id;
  const cat = CATEGORIES.find(c => c.id === id);
  document.getElementById('sectionTitle').textContent = cat ? cat.label : 'Все товары';
  renderCategories();
  renderItems();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  searchQuery = '';
  document.getElementById('searchClear').style.display = 'none';
  renderItems();
}

function renderItems() {
  const grid = document.getElementById('itemsGrid');
  const q = searchQuery.toLowerCase();

  const filtered = ITEMS.filter(item => {
    const catMatch = activeCategory === 'all' || item.cat === activeCategory;
    const searchMatch = !q || item.name.toLowerCase().includes(q);
    return catMatch && searchMatch;
  });

  document.getElementById('itemsCount').textContent = filtered.length + ' товаров';

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="no-results"><div class="no-results-icon">🔍</div><h3>Ничего не найдено</h3><p>Попробуйте другой запрос</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(item => {
    const imgUrl = getItemImage(item.img);
    const imgEl = imgUrl
      ? `<img src="${imgUrl}" alt="${item.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">`
      : '';
    const fallbackEmoji = item.cat === 'enchant' ? '📗' :
      item.cat === 'weapon' ? '⚔️' : item.cat === 'armor' ? '🛡️' :
      item.cat === 'tool' ? '⛏️' : item.cat === 'potion' ? '🧪' :
      item.cat === 'food' ? '🍎' : '📦';

    const badgeHtml = item.badge ? `<div class="item-badge badge-${item.badge}">${item.badge === 'hot' ? 'ХИТ' : item.badge === 'rare' ? 'РЕДКОЕ' : 'ТОП'}</div>` : '';

    return `
      <div class="item-card">
        ${badgeHtml}
        <div class="item-img-wrap">
          ${imgEl}
          <span class="item-emoji" style="${imgUrl ? 'display:none' : ''}">${fallbackEmoji}</span>
        </div>
        <div class="item-name">${item.name}</div>
        <div class="item-qty">${item.qty}</div>
        <div class="item-footer">
          <div class="item-price">${item.price}<span>вон</span></div>
          <button class="item-buy-btn">Купить</button>
        </div>
      </div>
    `;
  }).join('');
}

document.getElementById('searchInput').addEventListener('input', function() {
  searchQuery = this.value;
  document.getElementById('searchClear').style.display = this.value ? 'block' : 'none';
  renderItems();
});

document.getElementById('totalCount').textContent = ITEMS.length;
renderCategories();
renderItems();
</script>
</body>
</html>
