<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Торговая Федерация</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1724;
  --bg-deep:#0a1019;
  --panel:#162235;
  --panel-2:#1b2a40;
  --panel-3:#22344f;
  --card:#163053;
  --card-2:#1a3760;
  --line:rgba(255,255,255,.08);
  --line-2:rgba(255,255,255,.12);
  --text:#f2f6ff;
  --muted:rgba(226,235,255,.62);
  --muted-2:rgba(226,235,255,.38);
  --blue:#2488ff;
  --blue-2:#1d74dd;
  --price:#a7b7d1;
  --shadow:0 18px 45px rgba(0,0,0,.34);
  --radius:16px;
  --radius2:12px;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Inter',sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 50% -10%, rgba(60,90,140,.18), transparent 35%),
    linear-gradient(180deg, rgba(7,10,16,.82), rgba(7,10,16,.9)),
    url('https://images.unsplash.com/photo-1511497584788-876760111969?auto=format&fit=crop&w=1600&q=80') center/cover fixed;
  overflow-x:hidden;
}

/* мягкое затемнение */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    linear-gradient(180deg, rgba(8,13,22,.52), rgba(8,13,22,.78)),
    radial-gradient(circle at center, transparent 20%, rgba(0,0,0,.28) 100%);
  pointer-events:none;
  z-index:0;
}

.app{
  position:relative;
  z-index:1;
  width:min(1080px, calc(100% - 40px));
  margin:52px auto;
}

.shop-wrap{
  background:linear-gradient(180deg, rgba(18,31,50,.92), rgba(17,29,46,.94));
  border:1px solid var(--line);
  border-radius:18px;
  box-shadow:var(--shadow);
  display:grid;
  grid-template-columns:190px 1fr;
  min-height:760px;
  overflow:hidden;
  backdrop-filter:blur(10px);
}

/* sidebar */
.sidebar{
  background:linear-gradient(180deg, rgba(20,33,52,.96), rgba(18,29,45,.96));
  border-right:1px solid var(--line);
  padding:26px 14px 18px;
}

.sidebar h2{
  font-size:18px;
  font-weight:800;
  margin:0 0 16px 10px;
  letter-spacing:-.02em;
}

.cat-list{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.cat-btn{
  display:flex;
  align-items:center;
  gap:12px;
  width:100%;
  background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
  border:1px solid var(--line);
  color:rgba(242,246,255,.9);
  border-radius:10px;
  padding:12px 12px;
  cursor:pointer;
  font:600 15px/1 'Inter',sans-serif;
  transition:.18s ease;
  text-align:left;
}

.cat-btn:hover{
  transform:translateY(-1px);
  border-color:rgba(255,255,255,.15);
  background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
}

.cat-btn.active{
  background:linear-gradient(180deg, var(--blue), var(--blue-2));
  border-color:rgba(255,255,255,.14);
  box-shadow:0 8px 20px rgba(36,136,255,.28);
}

.cat-icon{
  width:22px;
  height:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  font-size:18px;
}

.cat-label{
  font-size:15px;
  font-weight:600;
  line-height:1.1;
}

/* content */
.content{
  padding:26px 24px 26px 24px;
  min-width:0;
}

.topbar{
  display:flex;
  flex-direction:column;
  gap:14px;
  margin-bottom:18px;
}

.title-row{
  display:flex;
  align-items:center;
  gap:8px;
}

.title-row h1{
  font-size:18px;
  font-weight:800;
  letter-spacing:-.02em;
}

.info-dot{
  width:16px;
  height:16px;
  border-radius:50%;
  border:1px solid rgba(70,160,255,.7);
  color:#72b7ff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  font-weight:800;
  opacity:.9;
}

.search-wrap{
  position:relative;
  width:min(640px, 100%);
}

.search-wrap input{
  width:100%;
  height:42px;
  border:none;
  outline:none;
  border-radius:10px;
  padding:0 42px 0 42px;
  color:#edf4ff;
  background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
  border:1px solid var(--line);
  font:500 15px 'Inter',sans-serif;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
}

.search-wrap input::placeholder{
  color:rgba(237,244,255,.5);
}

.search-wrap svg{
  position:absolute;
  left:14px;
  top:50%;
  transform:translateY(-50%);
  opacity:.45;
}

.clear-btn{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  width:24px;
  height:24px;
  border:none;
  border-radius:8px;
  background:transparent;
  color:rgba(255,255,255,.6);
  cursor:pointer;
  display:none;
}

.clear-btn:hover{
  background:rgba(255,255,255,.08);
  color:#fff;
}

/* grid */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(150px, 1fr));
  gap:12px;
  align-content:start;
}

.card{
  background:linear-gradient(180deg, #18345a 0%, #173053 100%);
  border:1px solid rgba(255,255,255,.08);
  border-radius:10px;
  overflow:hidden;
  min-height:175px;
  display:flex;
  flex-direction:column;
  transition:.18s ease;
  box-shadow:0 6px 16px rgba(0,0,0,.16);
}

.card:hover{
  transform:translateY(-3px);
  border-color:rgba(255,255,255,.16);
  box-shadow:0 12px 25px rgba(0,0,0,.24);
}

.card-name{
  min-height:52px;
  padding:10px 10px 4px;
  text-align:center;
  font-size:13px;
  font-weight:700;
  line-height:1.28;
  color:#f4f8ff;
}

.card-img{
  flex:1;
  min-height:82px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:6px 10px 10px;
}

.card-img img{
  width:52px;
  height:52px;
  object-fit:contain;
  image-rendering:pixelated;
  filter:drop-shadow(0 4px 8px rgba(0,0,0,.28));
}

.card-price{
  background:linear-gradient(180deg, #9aa8bf, #aebbd0);
  color:#fff;
  text-align:center;
  padding:9px 8px;
  font-weight:800;
  font-size:14px;
  letter-spacing:-.01em;
}

.card-price span{
  font-size:30px;
  line-height:1;
  vertical-align:middle;
}

.card-price small{
  font-size:13px;
  font-weight:700;
  opacity:.98;
  margin-left:4px;
}

.no-results{
  grid-column:1/-1;
  min-height:240px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:var(--muted);
  font-size:16px;
  border:1px dashed rgba(255,255,255,.12);
  border-radius:14px;
  background:rgba(255,255,255,.02);
  padding:20px;
}

/* custom scrollbar */
.content{
  max-height:760px;
  overflow:auto;
}
.content::-webkit-scrollbar{width:10px}
.content::-webkit-scrollbar-track{background:transparent}
.content::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,.12);
  border-radius:20px;
  border:2px solid transparent;
  background-clip:padding-box;
}
.content::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.18)}

@media (max-width: 900px){
  .shop-wrap{
    grid-template-columns:1fr;
  }
  .sidebar{
    border-right:none;
    border-bottom:1px solid var(--line);
  }
  .cat-list{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
  }
  .content{
    max-height:none;
  }
}

@media (max-width: 560px){
  .app{width:min(100% - 16px, 1080px);margin:18px auto}
  .content,.sidebar{padding:16px}
  .grid{grid-template-columns:repeat(2, minmax(0,1fr))}
  .cat-list{grid-template-columns:1fr}
}
</style>
</head>
<body>
  <div class="app">
    <div class="shop-wrap">
      <aside class="sidebar">
        <h2>Категории</h2>
        <div class="cat-list" id="catList"></div>
      </aside>

      <main class="content">
        <div class="topbar">
          <div class="title-row">
            <h1>Торговая Федерация</h1>
            <div class="info-dot">i</div>
          </div>

          <div class="search-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round">
              <circle cx="11" cy="11" r="7"></circle>
              <line x1="20" y1="20" x2="16.65" y2="16.65"></line>
            </svg>
            <input id="searchInput" type="text" placeholder="Найти предмет">
            <button class="clear-btn" id="clearBtn" aria-label="Очистить">✕</button>
          </div>
        </div>

        <div class="grid" id="grid"></div>
      </main>
    </div>
  </div>

<script>
const BASE = 'https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.21/assets/minecraft/textures/';
const ITEM = BASE + 'item/';
const BLOCK = BASE + 'block/';

const ICONS = {
  magma_block: BLOCK + 'magma.png',
  item_frame: ITEM + 'item_frame.png',
  golden_axe: ITEM + 'golden_axe.png',
  diamond_sword: ITEM + 'diamond_sword.png',
  redstone: ITEM + 'redstone.png',
  enchanted_book: ITEM + 'enchanted_book.png',
  iron_chestplate: ITEM + 'iron_chestplate.png',
  bricks: BLOCK + 'bricks.png',
  raw_copper: ITEM + 'raw_copper.png',
  brewing_stand: ITEM + 'brewing_stand.png',
  saddle: ITEM + 'saddle.png',
  cooked_beef: ITEM + 'cooked_beef.png',
  chest: BLOCK + 'chest_front.png',

  crimson_stem: BLOCK + 'crimson_stem_top.png',
  chorus_fruit: ITEM + 'chorus_fruit.png',
  popped_chorus_fruit: ITEM + 'popped_chorus_fruit.png',
  end_rod: ITEM + 'end_rod.png',
  torchflower: ITEM + 'torchflower.png',
  chorus_flower: BLOCK + 'chorus_flower.png',
  purple_shulker_box: BLOCK + 'shulker_box.png',
  apple: ITEM + 'apple.png',
  bamboo_block: BLOCK + 'bamboo_block.png',
  oak_log: BLOCK + 'oak_log_top.png',
  golden_apple: ITEM + 'golden_apple.png',
  pink_petals: BLOCK + 'pink_petals.png',
  bamboo_planks: BLOCK + 'bamboo_planks.png',
  oak_planks: BLOCK + 'oak_planks.png',
  enchanted_golden_apple: ITEM + 'enchanted_golden_apple.png',
  azalea_leaves: BLOCK + 'azalea_leaves.png',
  carrot: ITEM + 'carrot.png',
  golden_carrot: ITEM + 'golden_carrot.png',
  bookshelf: BLOCK + 'bookshelf.png',
  chiseled_bookshelf: BLOCK + 'chiseled_bookshelf_empty.png',

  anvil: BLOCK + 'anvil.png',
  piston: BLOCK + 'piston_top.png',
  lantern: BLOCK + 'lantern.png',
  rail: BLOCK + 'rail.png',
  diamond_pickaxe: ITEM + 'diamond_pickaxe.png',
  bow: ITEM + 'bow.png',
  netherite_chestplate: ITEM + 'netherite_chestplate.png',
  bread: ITEM + 'bread.png'
};

const CATEGORIES = [
  { id:'all', label:'Все', icon:'magma_block' },
  { id:'decor', label:'Декорации', icon:'item_frame' },
  { id:'tools', label:'Инструменты', icon:'golden_axe' },
  { id:'weapons', label:'Оружие', icon:'diamond_sword' },
  { id:'mechanisms', label:'Механизмы', icon:'redstone' },
  { id:'enchants', label:'Зачарование', icon:'enchanted_book' },
  { id:'armor', label:'Броня', icon:'iron_chestplate' },
  { id:'building', label:'Строительство', icon:'bricks' },
  { id:'ore', label:'Руда', icon:'raw_copper' },
  { id:'brewing', label:'Зельеварение', icon:'brewing_stand' },
  { id:'transport', label:'Транспорт', icon:'saddle' },
  { id:'food', label:'Еда', icon:'cooked_beef' },
  { id:'misc', label:'Прочее', icon:'chest' }
];

const ITEMS = [
  { name:'Магровое бревно (64 шт)', price:4, cat:'building', img:'crimson_stem' },
  { name:'Плод хоруса (64 шт)', price:2, cat:'food', img:'chorus_fruit' },
  { name:'Приготовленный плод хоруса (64 шт)', price:3, cat:'food', img:'popped_chorus_fruit' },
  { name:'Стержень энда (16 шт)', price:2, cat:'decor', img:'end_rod' },

  { name:'Факельник / Кувшинка (64 шт)', price:2, cat:'decor', img:'torchflower' },
  { name:'Цветок хоруса (64 шт)', price:5, cat:'decor', img:'chorus_flower' },
  { name:'Шалкер', price:5, cat:'misc', img:'purple_shulker_box' },
  { name:'Яблоко (64 шт)', price:2, cat:'food', img:'apple' },

  { name:'Блок бамбука (64 шт)', price:4, cat:'building', img:'bamboo_block' },
  { name:'Бревна (все типы дерева) (64 шт)', price:3, cat:'building', img:'oak_log' },
  { name:'Золотое яблоко (64 шт)', price:5, cat:'food', img:'golden_apple' },
  { name:'Любой цветок (64 шт)', price:1, cat:'decor', img:'pink_petals' },

  { name:'Бамбуковые доски (64 шт)', price:2, cat:'building', img:'bamboo_planks' },
  { name:'Все типы досок (64 шт)', price:1, cat:'building', img:'oak_planks' },
  { name:'Зачарованное золотое яблоко (64 шт)', price:12, cat:'food', img:'enchanted_golden_apple' },
  { name:'Вся листва (64 шт)', price:1, cat:'decor', img:'azalea_leaves' },

  { name:'Морковь (64 шт)', price:1, cat:'food', img:'carrot' },
  { name:'Золотая морковь (64 шт)', price:3, cat:'food', img:'golden_carrot' },
  { name:'Резная книжная полка (64 шт)', price:5, cat:'decor', img:'chiseled_bookshelf' },
  { name:'Книжная полка (64 шт)', price:4, cat:'decor', img:'bookshelf' },

  { name:'Наковальня', price:3, cat:'tools', img:'anvil' },
  { name:'Поршень (64 шт)', price:2, cat:'mechanisms', img:'piston' },
  { name:'Фонарь (64 шт)', price:2, cat:'decor', img:'lantern' },
  { name:'Рельсы (64 шт)', price:3, cat:'transport', img:'rail' },

  { name:'Алмазная кирка', price:2, cat:'tools', img:'diamond_pickaxe' },
  { name:'Лук', price:2, cat:'weapons', img:'bow' },
  { name:'Незеритовый нагрудник', price:8, cat:'armor', img:'netherite_chestplate' },
  { name:'Хлеб (64 шт)', price:1, cat:'food', img:'bread' }
];

let activeCategory = 'all';
let searchValue = '';

const catList = document.getElementById('catList');
const grid = document.getElementById('grid');
const searchInput = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearBtn');

function renderCategories(){
  catList.innerHTML = CATEGORIES.map(cat => `
    <button class="cat-btn ${cat.id === activeCategory ? 'active' : ''}" onclick="setCategory('${cat.id}')">
      <div class="cat-icon">
        <img src="${ICONS[cat.icon]}" alt="" style="width:20px;height:20px;object-fit:contain;image-rendering:pixelated">
      </div>
      <div class="cat-label">${cat.label}</div>
    </button>
  `).join('');
}

function renderItems(){
  const q = searchValue.trim().toLowerCase();

  const filtered = ITEMS.filter(item => {
    const byCat = activeCategory === 'all' || item.cat === activeCategory;
    const bySearch = !q || item.name.toLowerCase().includes(q);
    return byCat && bySearch;
  });

  if(!filtered.length){
    grid.innerHTML = `<div class="no-results">Ничего не найдено</div>`;
    return;
  }

  grid.innerHTML = filtered.map(item => `
    <div class="card">
      <div class="card-name">${item.name}</div>
      <div class="card-img">
        <img src="${ICONS[item.img]}" alt="${item.name}" loading="lazy">
      </div>
      <div class="card-price">от <span>${item.price}</span><small>ар</small></div>
    </div>
  `).join('');
}

function setCategory(id){
  activeCategory = id;
  renderCategories();
  renderItems();
}

searchInput.addEventListener('input', e => {
  searchValue = e.target.value;
  clearBtn.style.display = searchValue ? 'block' : 'none';
  renderItems();
});

clearBtn.addEventListener('click', () => {
  searchValue = '';
  searchInput.value = '';
  clearBtn.style.display = 'none';
  renderItems();
});

renderCategories();
renderItems();
</script>
</body>
</html>
