<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sun Federation — SunShield</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root{
  --bg:#1a2235;
  --panel:#1e2d45;
  --panel2:#243450;
  --stroke:rgba(255,255,255,0.08);
  --text:#e0e8f0;
  --muted:rgba(255,255,255,0.55);
  --muted2:rgba(255,255,255,0.28);
  --brand:#2563eb;
}

body{
  background: var(--bg);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
}

body::before{
  content:'';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse 120% 60% at 50% -10%, rgba(30,60,120,0.5) 0%, transparent 60%);
  pointer-events:none; z-index:0;
}

/* NAV */
nav{
  position: relative; z-index: 100;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 32px; height:56px;
  background: rgba(12,17,32,0.98);
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.nav-brand{ font-size:16px; font-weight:900; color:#fff; letter-spacing:0.2px; }
.nav-links{ display:flex; gap:4px; }
.nav-links a{
  color: rgba(255,255,255,0.5);
  font-size:13px; font-weight:800;
  padding:6px 14px; border-radius:8px;
  transition: all .15s; text-decoration:none;
}
.nav-links a:hover{ color:#fff; background: rgba(255,255,255,0.07); }
.btn-site{
  background: var(--brand); color:#fff; border:none;
  padding:7px 18px; border-radius:9px; font-size:13px;
  font-weight:900; cursor:pointer; font-family:inherit;
  text-decoration:none; transition: filter .15s;
}
.btn-site:hover{ filter: brightness(1.08); }

/* TOP BUTTONS */
.top-buttons{
  position: relative; z-index: 10;
  padding: 20px 32px 0;
  display:flex; gap:8px; flex-wrap:wrap;
}
.top-btn{
  padding: 8px 20px; border-radius: 10px;
  font-size: 13px; font-weight: 900;
  cursor: pointer; font-family: inherit; border: none;
  transition: all .15s;
}
.top-btn.active{ background: var(--brand); color:#fff; }
.top-btn:not(.active){ background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.55); }
.top-btn:not(.active):hover{ background: rgba(255,255,255,0.12); color:#fff; }

/* LAYOUT */
.layout{
  position: relative; z-index: 10;
  display:flex; gap: 24px;
  padding: 20px 32px 40px;
  max-width: 1400px;
  margin: 0 auto;
  align-items:flex-start;
}

/* SIDEBAR */
.sidebar{ width: 240px; flex-shrink:0; }
.sidebar-title{
  font-size: 22px; font-weight: 1000;
  color:#fff; margin-bottom: 14px; padding-left: 4px;
}
.cat-list{ display:flex; flex-direction:column; gap:4px; }
.cat-btn{
  display:flex; align-items:center; gap:10px;
  padding: 9px 12px;
  border-radius: 12px;
  border: 1px solid transparent;
  color: rgba(255,255,255,0.70);
  font-size: 14px; font-weight: 900;
  cursor:pointer; font-family:inherit;
  width:100%; text-align:left;
  transition: all .15s;
  background: transparent;
}
.cat-btn:hover{
  background: rgba(255,255,255,0.06);
  border-color: rgba(255,255,255,0.06);
  color:#fff;
}
.cat-btn.active{
  background: var(--brand);
  color:#fff;
}
.cat-icon-wrap{
  width: 30px; height: 30px; border-radius: 9px;
  background: rgba(255,255,255,0.08);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; overflow:hidden;
}
.cat-btn.active .cat-icon-wrap{ background: rgba(255,255,255,0.18); }
.cat-icon-wrap img{
  width: 22px; height: 22px;
  image-rendering: pixelated;
  object-fit: contain;
}

/* MAIN */
.shop-main{ flex:1; min-width:0; }

/* SEARCH */
.search-wrap{ margin-bottom: 14px; }
.search-box{ position: relative; }
.search-box input{
  width:100%;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 12px;
  color:#fff;
  font-size: 14px; font-family:inherit; font-weight: 800;
  padding: 11px 16px 11px 44px;
  outline:none;
  transition: border-color .2s, background .2s;
}
.search-box input::placeholder{ color: rgba(255,255,255,0.25); font-weight: 700; }
.search-box input:focus{
  border-color: var(--brand);
  background: rgba(255,255,255,0.09);
}
.s-icon{
  position:absolute; left:14px; top:50%;
  transform: translateY(-50%);
  opacity: 0.35;
}
.search-clear{
  position:absolute; right:12px; top:50%;
  transform: translateY(-50%);
  background:none; border:none;
  color: rgba(255,255,255,0.45);
  cursor:pointer;
  font-size: 16px;
  display:none;
  padding: 4px 6px;
}
.search-clear:hover{ color:#fff; }

/* GRID */
.items-grid{
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
}

/* CARD */
.item-card{
  background: var(--panel);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  transition: transform .15s, box-shadow .15s, border-color .15s;
}
.item-card:hover{
  transform: translateY(-3px);
  border-color: rgba(255,255,255,0.10);
  box-shadow: 0 14px 36px rgba(0,0,0,0.55);
}

.item-name-top{
  padding: 10px 10px 6px;
  text-align:center;
  min-height: 48px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap: 3px;
}
.item-name-top .title{
  font-size: 12px;
  font-weight: 1000;
  color: #d6e3ff;
  line-height: 1.25;
}
.item-name-top .item-qty-label{
  font-size: 10px;
  font-weight: 800;
  color: rgba(200,216,240,0.45);
}

.item-img-area{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding: 12px;
  min-height: 102px;
}
.item-img-area img{
  width: 76px; height: 76px;
  image-rendering: pixelated;
  object-fit: contain;
  filter: drop-shadow(0 3px 8px rgba(0,0,0,0.55));
}
.img-placeholder{
  width: 76px; height: 76px;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  border: 1px dashed rgba(255,255,255,0.10);
}

.item-price-bar{
  background: var(--panel2);
  padding: 10px 12px;
  text-align:center;
  font-size: 18px;
  font-weight: 1000;
  color:#fff;
  letter-spacing: 0.01em;
}
.item-price-bar .cur{
  font-size: 12px;
  font-weight: 900;
  color: rgba(255,255,255,0.45);
  margin-left: 3px;
}

/* NO RESULTS */
.no-results{
  grid-column:1/-1;
  text-align:center;
  padding: 60px 20px;
  color: rgba(255,255,255,0.28);
  font-size: 15px;
  font-weight: 900;
}

/* FOOTER */
footer{
  position: relative; z-index: 10;
  background: rgba(10,14,25,0.85);
  border-top: 1px solid rgba(255,255,255,0.06);
  padding: 26px 32px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap: 10px;
  flex-wrap:wrap;
}
.footer-brand{ font-size: 14px; font-weight: 1000; color: rgba(255,255,255,0.55); }
.footer-copy{ font-size: 12px; font-weight: 800; color: rgba(255,255,255,0.22); }

@media(max-width:900px){
  .layout{ flex-direction:column; padding:16px; gap: 14px; }
  .sidebar{ width:100%; }
  .cat-list{ flex-direction:row; flex-wrap:wrap; }
  .cat-btn{ width:auto; }
  nav{ padding:0 16px; }
  .nav-links{ display:none; }
  .top-buttons{ padding:14px 16px 0; }
}
</style>
</head>

let activeCategory = 'all';
let searchQuery = '';
let topMode = 'recommended'; // recommended | minimal | all

const catListEl = document.getElementById('catList');
const itemsGridEl = document.getElementById('itemsGrid');
const searchInputEl = document.getElementById('searchInput');
const searchClearEl = document.getElementById('searchClear');
const topButtonsEl = document.getElementById('topButtons');

function renderCategories(){
  catListEl.innerHTML = CATEGORIES.map(c => {
    const isActive = c.id === activeCategory;
    const icon = CAT_IMG[c.id] || IMG.fallback;
    return `
      <button class="cat-btn ${isActive ? 'active' : ''}" type="button" data-cat="${c.id}">
        <div class="cat-icon-wrap">
          <img src="${icon}" alt="">
        </div>
        ${c.label}
      </button>
    `;
  }).join('');
}

function passTopMode(item){
  if (topMode === 'all') return true;
  if (topMode === 'recommended') return item.price >= 10; // можно поменять правило
  if (topMode === 'minimal') return item.price <= 5;      // можно поменять правило
  return true;
}

function renderItems(){
  const q = searchQuery.trim().toLowerCase();

  const filtered = ITEMS.filter(item => {
    const okCat = (activeCategory === 'all' || item.cat === activeCategory);
    const okSearch = (!q || item.name.toLowerCase().includes(q));
    const okMode = passTopMode(item);
    return okCat && okSearch && okMode;
  });

  if (!filtered.length){
    itemsGridEl.innerHTML = `<div class="no-results">Ничего не найдено</div>`;
    return;
  }

  itemsGridEl.innerHTML = filtered.map(item => {
    const qtyLabel = (item.qty && item.qty !== '1 шт.') ? `<div class="item-qty-label">${item.qty}</div>` : '';
    const src = IMG[item.img] || IMG.fallback;

    return `
      <div class="item-card">
        <div class="item-name-top">
          <div class="title">${item.name}</div>
          ${qtyLabel}
        </div>
        <div class="item-img-area">
          <img src="${src}" alt="${item.name}"
               onerror="this.outerHTML='<div class=&quot;img-placeholder&quot;></div>'">
        </div>
        <div class="item-price-bar">${item.price}<span class="cur"> вон</span></div>
      </div>
    `;
  }).join('');
}

/* Категории: делегирование событий */
catListEl.addEventListener('click', (e) => {
  const btn = e.target.closest('.cat-btn');
  if (!btn) return;
  activeCategory = btn.dataset.cat;
  renderCategories();
  renderItems();
});

/* Поиск */
searchInputEl.addEventListener('input', () => {
  searchQuery = searchInputEl.value;
  searchClearEl.style.display = searchQuery ? 'block' : 'none';
  renderItems();
});
searchClearEl.addEventListener('click', () => {
  searchInputEl.value = '';
  searchQuery = '';
  searchClearEl.style.display = 'none';
  renderItems();
});

/* Верхние кнопки */
topButtonsEl.addEventListener('click', (e) => {
  const btn = e.target.closest('.top-btn');
  if (!btn) return;

  topMode = btn.dataset.mode;

  document.querySelectorAll('.top-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  renderItems();
});

renderCategories();
renderItems();
</script>
