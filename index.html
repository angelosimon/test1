<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Плавное приближение картинки</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            overflow: hidden; /* Скрываем прокрутку страницы */
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Контейнер для кнопок управления */
        .controls {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 30px;
            display: flex;
            gap: 15px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn {
            background: #333;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:hover {
            background: #555;
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* Область, где находится картинка */
        .zoom-area {
            flex: 1;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
        }

        .zoom-area:active {
            cursor: grabbing;
        }

        /* Сама картинка */
        #panzoom-element {
            max-width: 90%;
            max-height: 90vh;
            object-fit: contain;
            transition: transform 0.1s ease-out; /* Плавность при движении */
            will-change: transform;
        }
    </style>
</head>
<body>

    <div class="controls">
        <button class="btn" id="zoom-in">➕ Приблизить</button>
        <button class="btn" id="zoom-out">➖ Отдалить</button>
        <button class="btn" id="reset">🔄 Сбросить</button>
    </div>

    <div class="zoom-area" id="wrapper">
        <img id="panzoom-element" src="https://i.ibb.co/KjnJmbg2/Screenshot-2026-06-08-013310.png" alt="Скриншот">
    </div>

    <script>
        // Инициализируем элементы
        const element = document.getElementById('panzoom-element');
        const wrapper = document.getElementById('wrapper');
        
        const zoomInButton = document.getElementById('zoom-in');
        const zoomOutButton = document.getElementById('zoom-out');
        const resetButton = document.getElementById('reset');

        // Настраиваем Panzoom
        const panzoom = Panzoom(element, {
            maxScale: 10,  // Максимальное приближение (в 10 раз)
            minScale: 0.5, // Максимальное отдаление
            canvas: true   // Улучшает отзывчивость внутри контейнера
        });

        // Включаем зум колесиком мыши (с зажатым Ctrl или просто так)
        wrapper.addEventListener('wheel', (event) => {
            event.preventDefault();
            panzoom.zoomWithWheel(event, {
                animate: true,
                step: 0.1 // Скорость зума колесиком
            });
        });

        // Привязываем функции к кнопкам
        zoomInButton.addEventListener('click', () => panzoom.zoomIn({ animate: true }));
        zoomOutButton.addEventListener('click', () => panzoom.zoomOut({ animate: true }));
        resetButton.addEventListener('click', () => panzoom.reset({ animate: true }));
    </script>

</body>
</html>
