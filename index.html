<title>Sun Federation — SunShield</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#151f30;color:#e0e8f0;font-family:'Nunito',sans-serif;min-height:100vh}
nav{position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:54px;background:#0d1420;border-bottom:1px solid rgba(255,255,255,.06)}
.nav-brand{font-size:15px;font-weight:900;color:#fff}
.nav-links{display:flex;gap:2px}
.nav-links a{color:rgba(255,255,255,.45);font-size:13px;font-weight:700;padding:6px 12px;border-radius:8px;transition:all .15s;text-decoration:none}
.nav-links a:hover{color:#fff;background:rgba(255,255,255,.06)}
.btn-site{background:#2563eb;color:#fff;border:none;padding:7px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none}
.btn-site:hover{background:#1d4ed8}
.top-tabs{padding:16px 28px 0;display:flex;gap:8px}
.tab-btn{padding:7px 18px;border-radius:9px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;border:none;transition:all .15s}
.tab-btn.active{background:#2563eb;color:#fff}
.tab-btn:not(.active){background:rgba(255,255,255,.07);color:rgba(255,255,255,.45)}
.tab-btn:not(.active):hover{background:rgba(255,255,255,.11);color:#ccc}
.layout{display:flex;gap:0;padding:18px 28px 40px;max-width:1400px;margin:0 auto;align-items:flex-start}
.sidebar{width:210px;flex-shrink:0;margin-right:20px}
.sidebar-title{font-size:20px;font-weight:900;color:#fff;margin-bottom:12px}
.cat-list{display:flex;flex-direction:column;gap:3px}
.cat-btn{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:11px;border:none;color:rgba(255,255,255,.6);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;text-align:left;transition:all .15s;background:transparent}
.cat-btn:hover{background:rgba(255,255,255,.06);color:#ddd}
.cat-btn.active{background:#2563eb;color:#fff}
.cat-icon{width:28px;height:28px;border-radius:7px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cat-btn.active .cat-icon{background:rgba(255,255,255,.18)}
.cat-icon img{width:20px;height:20px;image-rendering:pixelated;object-fit:contain}
.search-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.search-box{position:relative;flex:1}
.search-box input{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.09);border-radius:11px;color:#fff;font-size:13px;font-family:inherit;font-weight:700;padding:10px 36px 10px 38px;outline:none;transition:border-color .2s}
.search-box input::placeholder{color:rgba(255,255,255,.22)}
.search-box input:focus{border-color:#2563eb}
.s-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.3;pointer-events:none}
.s-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.35);cursor:pointer;font-size:15px;display:none;padding:2px 5px;font-family:inherit;line-height:1}
.s-clear:hover{color:#fff}
.items-count{font-size:12px;font-weight:700;color:rgba(255,255,255,.25);white-space:nowrap}
.shop-main{flex:1;min-width:0}
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px}
.item-card{background:#1e2d45;border-radius:13px;overflow:hidden;display:flex;flex-direction:column;transition:transform .15s,box-shadow .15s}
.item-card:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,0,0,.55)}
.card-name{padding:9px 8px 5px;font-size:11.5px;font-weight:800;color:#c5d8ef;text-align:center;line-height:1.3;min-height:34px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.card-qty{font-size:10px;font-weight:600;color:rgba(180,210,240,.38);margin-top:1px;display:block}
.card-img{display:flex;align-items:center;justify-content:center;padding:10px 8px;min-height:90px;background:#1e2d45}
.card-img img{width:68px;height:68px;image-rendering:pixelated;object-fit:contain;filter:drop-shadow(0 3px 6px rgba(0,0,0,.6))}
.card-price{background:#243450;padding:9px 10px;text-align:center;font-size:17px;font-weight:900;color:#fff;letter-spacing:.01em}
.card-price .cur{font-size:11px;font-weight:700;color:rgba(255,255,255,.4);margin-left:2px}
.no-results{grid-column:1/-1;text-align:center;padding:50px 20px;color:rgba(255,255,255,.2);font-size:14px;font-weight:700}
footer{background:#0d1420;border-top:1px solid rgba(255,255,255,.05);padding:22px 28px;display:flex;align-items:center;justify-content:space-between}
.footer-brand{font-size:13px;font-weight:800;color:rgba(255,255,255,.4)}
.footer-copy{font-size:11px;color:rgba(255,255,255,.18)}
@media(max-width:780px){.layout{flex-direction:column;padding:12px}.sidebar{width:100%;margin-right:0;margin-bottom:14px}.cat-list{flex-direction:row;flex-wrap:wrap}nav{padding:0 14px}.nav-links{display:none}.top-tabs{padding:12px 14px 0}}
</style>
</head>

let activeCat='all',search='';
function renderCats(){
document.getElementById('catList').innerHTML=CATS.map(c=>`<button class="cat-btn${c.id===activeCat?' active':''}" onclick="setCat('${c.id}')"><div class="cat-icon"><img src="${c.img}" alt="" onerror="this.style.opacity=0"></div>${c.label}</button>`).join('');
}
function setCat(id){activeCat=id;renderCats();renderItems();}
function clearSearch(){document.getElementById('searchInput').value='';search='';document.getElementById('sClear').style.display='none';renderItems();}
function renderItems(){
const q=search.toLowerCase();
const list=ITEMS.filter(it=>(activeCat==='all'||it.cat===activeCat)&&(!q||it.name.toLowerCase().includes(q)));
document.getElementById('iCount').textContent=list.length+' товаров';
if(!list.length){document.getElementById('grid').innerHTML='<div class="no-results">Ничего не найдено</div>';return;}
document.getElementById('grid').innerHTML=list.map(it=>{
const url=T[it.img]||'';
const st=PH[it.img]?` style="filter:${PH[it.img]}"`:' style=""';
const qh=(it.qty&&it.qty!=='1 шт.')?`<span class="card-qty">${it.qty}</span>`:'';
return`<div class="item-card"><div class="card-name">${it.name}${qh}</div><div class="card-img"><img src="${url}" alt="${it.name}"${st} loading="lazy"></div><div class="card-price">${it.price}<span class="cur"> вон</span></div></div>`;
}).join('');
}
document.getElementById('searchInput').addEventListener('input',function(){search=this.value;document.getElementById('sClear').style.display=this.value?'block':'none';renderItems();});
renderCats();renderItems();
</script>
