<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sun Federation — SunShield Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #f0f4f8;
  --bg2:     #e8eef5;
  --white:   #ffffff;
  --black:   #0f1923;
  --black2:  #1a2535;
  --teal:    #5bbfcc;
  --teal2:   #3aa8b8;
  --teal-soft: rgba(91,191,204,0.12);
  --teal-border: rgba(91,191,204,0.3);
  --border:  rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.11);
  --text:    #0f1923;
  --text2:   rgba(15,25,35,0.55);
  --text3:   rgba(15,25,35,0.3);
  --shadow:  0 2px 16px rgba(0,0,0,0.08);
  --shadow2: 0 8px 32px rgba(0,0,0,0.12);
  --r: 16px;
  --r2: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
.bg-wrap {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
}
.bg-aurora {
  position: absolute; top: -80px; left: -10%; width: 120%; height: 260px;
  background: linear-gradient(180deg, rgba(91,191,204,0.18) 0%, rgba(160,220,230,0.10) 40%, transparent 100%);
  filter: blur(30px);
  animation: aurora-sway 10s ease-in-out infinite alternate;
}
.bg-aurora2 {
  position: absolute; top: -40px; left: 20%; width: 80%; height: 180px;
  background: linear-gradient(180deg, rgba(180,230,255,0.14) 0%, transparent 100%);
  filter: blur(40px);
  animation: aurora-sway 14s ease-in-out infinite alternate-reverse;
}
@keyframes aurora-sway {
  from { transform: translateX(-3%) skewX(-1deg); opacity:.8; }
  to   { transform: translateX(3%) skewX(1deg);  opacity:1; }
}
.flake {
  position: absolute; color: rgba(91,191,204,0.35); font-size: 10px;
  animation: fall linear infinite; user-select: none;
}
@keyframes fall {
  from { transform: translateY(-30px) rotate(0deg); opacity:0; }
  10%  { opacity:1; }
  90%  { opacity:.3; }
  to   { transform: translateY(100vh) rotate(360deg); opacity:0; }
}
nav {
  position: sticky; top: 0; z-index: 500;
  height: 58px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 36px;
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border2);
  box-shadow: 0 1px 0 rgba(0,0,0,0.04);
}
.nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.nav-logo-icon {
  width: 34px; height: 34px; border-radius: 10px;
  background: linear-gradient(135deg, #fbbf24, #f59e0b);
  display: flex; align-items: center; justify-content: center; font-size: 17px;
  box-shadow: 0 4px 12px rgba(251,191,36,0.35); flex-shrink: 0;
}
.nav-logo-text { font-size: 16px; font-weight: 700; color: var(--black); letter-spacing: -0.01em; }
.nav-logo-badge {
  font-size: 10px; font-weight: 600; color: var(--text3);
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 6px; padding: 2px 8px; letter-spacing: 0.06em; text-transform: uppercase;
}
.nav-center { display: flex; align-items: center; gap: 2px; }
.nav-link {
  color: var(--text2); font-size: 14px; font-weight: 500;
  padding: 6px 14px; border-radius: 10px; text-decoration: none;
  transition: all 0.15s; cursor: pointer; border: none; background: none; font-family: inherit;
}
.nav-link:hover { color: var(--black); background: var(--bg2); }
.nav-right { display: flex; align-items: center; gap: 10px; }
.nav-discord {
  display: flex; align-items: center; gap: 7px;
  background: #5865F2; color: #fff; border: none; padding: 7px 18px; border-radius: 10px;
  font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
  text-decoration: none; transition: opacity 0.15s, transform 0.15s;
  box-shadow: 0 4px 12px rgba(88,101,242,0.3);
}
.nav-discord:hover { opacity: 0.88; transform: translateY(-1px); }
.nav-site-btn {
  background: var(--white); border: 1px solid var(--border2);
  color: var(--text); padding: 7px 16px; border-radius: 10px;
  font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
  text-decoration: none; transition: all 0.15s; box-shadow: var(--shadow);
}
.nav-site-btn:hover { background: var(--bg2); }
.hero {
  position: relative; z-index: 1;
  padding: 52px 36px 36px;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; text-align: center; gap: 14px;
}
.hero-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--white); border: 1px solid var(--border2);
  border-radius: 50px; padding: 6px 16px;
  font-size: 12px; font-weight: 600; color: var(--text2); box-shadow: var(--shadow);
}
.hero-badge-dot { width:6px;height:6px;border-radius:50%;background:#22c55e;box-shadow:0 0 8px #22c55e;animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.hero h1 { font-size: 52px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.05; color: var(--black); }
.hero h1 span { color: var(--teal); }
.hero p { font-size: 15px; color: var(--text2); max-width: 460px; line-height: 1.6; }
.hero-stats { display: flex; gap: 12px; margin-top: 4px; }
.hstat {
  background: var(--white); border: 1px solid var(--border2);
  border-radius: var(--r2); padding: 14px 28px; text-align: center;
  box-shadow: var(--shadow); transition: box-shadow 0.2s, transform 0.2s;
}
.hstat:hover { box-shadow: var(--shadow2); transform: translateY(-2px); }
.hstat-n { font-size: 26px; font-weight: 800; color: var(--black); line-height: 1; }
.hstat-n.teal { color: var(--teal2); }
.hstat-l { font-size: 11px; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 3px; font-weight: 600; }
.shell {
  position: relative; z-index: 1;
  max-width: 1380px; margin: 0 auto;
  padding: 0 24px 60px;
  display: flex; gap: 18px; align-items: flex-start;
}
.sidebar {
  width: 210px; flex-shrink: 0;
  background: var(--white); border: 1px solid var(--border2);
  border-radius: var(--r); padding: 14px 10px;
  box-shadow: var(--shadow); position: sticky; top: 74px;
}
.sidebar-title {
  font-size: 10px; font-weight: 700; color: var(--text3);
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 0 8px 10px; border-bottom: 1px solid var(--border); margin-bottom: 8px;
}
.cat-list { display: flex; flex-direction: column; gap: 2px; }
.cat-btn {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 10px; border-radius: 10px; border: none;
  color: var(--text2); font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: inherit; width: 100%; text-align: left;
  transition: all 0.15s; background: transparent;
}
.cat-btn:hover { background: var(--bg); color: var(--black); }
.cat-btn.active { background: var(--teal-soft); color: var(--black); font-weight: 600; border: 1px solid var(--teal-border); }
.cat-ico { width:28px;height:28px;border-radius:8px;background:var(--bg2);display:flex;align-items:center;justify-content:center;flex-shrink:0; }
.cat-btn.active .cat-ico { background: rgba(91,191,204,0.18); }
.cat-ico img { width:18px;height:18px;image-rendering:pixelated;object-fit:contain; }
.cat-count { margin-left:auto;font-size:10px;font-weight:700;color:var(--text3);background:var(--bg2);border-radius:6px;padding:1px 7px; }
.cat-btn.active .cat-count { background:rgba(91,191,204,0.2);color:var(--teal2); }
.shop-main { flex: 1; min-width: 0; }
.toolbar { display:flex;align-items:center;gap:10px;margin-bottom:16px; }
.search-wrap { position:relative;flex:1; }
.search-wrap input {
  width:100%; background:var(--white); border:1px solid var(--border2);
  border-radius:var(--r2); color:var(--black); font-size:14px;
  font-family:inherit; font-weight:500;
  padding:11px 40px 11px 42px; outline:none; transition:all 0.2s; box-shadow:var(--shadow);
}
.search-wrap input::placeholder { color:var(--text3); }
.search-wrap input:focus { border-color:var(--teal2); box-shadow:0 0 0 3px rgba(91,191,204,0.15); }
.s-ico { position:absolute;left:14px;top:50%;transform:translateY(-50%);opacity:.3;pointer-events:none; }
.s-clear { position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text2);cursor:pointer;font-size:14px;display:none;padding:3px 6px;border-radius:6px;transition:background .15s; }
.s-clear:hover { background:var(--bg2); }
.tabs { display:flex;gap:4px;background:var(--white);border:1px solid var(--border2);border-radius:var(--r2);padding:4px;box-shadow:var(--shadow); }
.tab-btn { padding:7px 16px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;border:none;transition:all .15s;letter-spacing:.01em;color:var(--text2);background:transparent;white-space:nowrap; }
.tab-btn.active { background:var(--black);color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.2); }
.items-count { font-size:12px;font-weight:600;color:var(--text3);white-space:nowrap; }
.section-hdr { display:flex;align-items:center;gap:12px;margin-bottom:14px; }
.section-hdr-title { font-size:12px;font-weight:700;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;white-space:nowrap; }
.section-hdr-line { flex:1;height:1px;background:var(--border2); }
.items-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(152px,1fr));gap:10px; }
.item-card {
  background:var(--white); border:1px solid var(--border);
  border-radius:14px; overflow:hidden; display:flex; flex-direction:column;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
  transition:transform .2s cubic-bezier(.2,.8,.2,1),box-shadow .2s,border-color .2s;
}
.item-card:hover { transform:translateY(-5px) scale(1.015);box-shadow:0 16px 40px rgba(0,0,0,.12),0 0 0 1.5px var(--teal-border);border-color:var(--teal-border); }
.card-name { padding:10px 10px 4px;font-size:11.5px;font-weight:600;color:var(--black);text-align:center;line-height:1.35;min-height:34px;display:flex;flex-direction:column;align-items:center;justify-content:center; }
.card-qty { font-size:10px;font-weight:500;color:var(--text3);margin-top:2px;display:block; }
.card-img { display:flex;align-items:center;justify-content:center;padding:10px 8px;min-height:92px;background:radial-gradient(ellipse 70% 60% at 50% 50%,rgba(91,191,204,.07) 0%,transparent 70%); }
.card-img img { width:64px;height:64px;image-rendering:pixelated;object-fit:contain;filter:drop-shadow(0 4px 8px rgba(0,0,0,.15));transition:transform .2s cubic-bezier(.2,.8,.2,1),filter .2s; }
.item-card:hover .card-img img { transform:scale(1.12) translateY(-3px);filter:drop-shadow(0 8px 16px rgba(0,0,0,.2)) drop-shadow(0 0 10px rgba(91,191,204,.3)); }
.card-price { background:var(--bg);border-top:1px solid var(--border);padding:9px 12px;text-align:center;display:flex;align-items:center;justify-content:center;gap:5px; }
.card-price-num { font-size:20px;font-weight:800;color:var(--black);line-height:1; }
.card-price-cur { font-size:11px;font-weight:600;color:var(--teal2); }
.no-results { grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--text3);font-size:15px;font-weight:500; }
.no-results span { font-size:40px;display:block;margin-bottom:12px; }
footer { position:relative;z-index:1;border-top:1px solid var(--border2);padding:24px 36px;display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.7);backdrop-filter:blur(12px); }
.footer-brand { font-size:14px;font-weight:700;color:var(--text2); }
.footer-copy { font-size:12px;color:var(--text3); }
@media(max-width:900px){
  .shell{flex-direction:column;padding:0 12px 40px;}
  .sidebar{width:100%;position:static;}
  .cat-list{flex-direction:row;flex-wrap:wrap;}
  .cat-count{display:none;}
  nav{padding:0 16px;}
  .nav-center{display:none;}
  .hero{padding:32px 16px 20px;}
  .hero h1{font-size:32px;}
  .hero-stats{flex-wrap:wrap;justify-content:center;}
}
@keyframes fade-up { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
nav{animation:fade-up .35s ease both}
.hero{animation:fade-up .4s .05s ease both}
.sidebar{animation:fade-up .4s .1s ease both}
.shop-main{animation:fade-up .4s .15s ease both}
</style>
</head>

function setTab(mode,btn){ sortMode=mode; document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderItems(); }
function renderCats(){
  document.getElementById('catList').innerHTML=CATS.map(c=>`<button class="cat-btn${c.id===activeCat?' active':''}" onclick="setCat('${c.id}')"><div class="cat-ico"><img src="${c.img}" alt="" onerror="this.style.opacity=0"></div>${c.label}<span class="cat-count">${catCounts[c.id]||0}</span></button>`).join('');
}
function setCat(id){ activeCat=id; const cat=CATS.find(c=>c.id===id); document.getElementById('sTitle').textContent=cat?cat.label+' — товары':'Все товары'; renderCats(); renderItems(); }
function clearSearch(){ document.getElementById('searchInput').value=''; search=''; document.getElementById('sClear').style.display='none'; renderItems(); }
function renderItems(){
  const q=search.toLowerCase();
  let list=ITEMS.filter(it=>(activeCat==='all'||it.cat===activeCat)&&(!q||it.name.toLowerCase().includes(q)));
  if(sortMode==='min') list=[...list].sort((a,b)=>a.price-b.price);
  document.getElementById('iCount').textContent=list.length+' ТОВАРОВ';
  if(!list.length){ document.getElementById('grid').innerHTML='<div class="no-results"><span>🔍</span>Ничего не найдено</div>'; return; }
  document.getElementById('grid').innerHTML=list.map(it=>{
    const url=T[it.img]||'';
    const fs=PTINT[it.img]?` style="filter:${PTINT[it.img]}"`:'';
    const qh=(it.qty&&it.qty!=='1 шт.')?`<span class="card-qty">${it.qty}</span>`:'';
    return`<div class="item-card"><div class="card-name">${it.name}${qh}</div><div class="card-img"><img src="${url}" alt="${it.name}"${fs} loading="lazy"></div><div class="card-price"><span class="card-price-num">${it.price}</span><span class="card-price-cur">вон</span></div></div>`;
  }).join('');
}
document.getElementById('searchInput').addEventListener('input',function(){ search=this.value; document.getElementById('sClear').style.display=this.value?'block':'none'; renderItems(); });
renderCats(); renderItems();
</script>
</body>
</html>
