<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToadShield Wiki Map</title>
    <style>
        :root {
            --bg-color: #0b0c0e;
            --panel-bg: rgba(255, 255, 255, 0.03);
            --panel-bg-hover: rgba(255, 255, 255, 0.08);
            --border-color: rgba(255, 255, 255, 0.06);
            --text-color: #efefef;
            --text-muted: #666666;
            --accent-disabled: rgba(255, 255, 255, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            color: var(--text-color);
            letter-spacing: -0.01em;
        }

        /* Экраны */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
        }

        .screen.active {
            display: block;
        }

        /* Главная сцена для зума */
        .scene {
            width: 100%;
            height: 100%;
            cursor: grab;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .scene:active {
            cursor: grabbing;
        }

        /* Обертка карты */
        .map-wrapper {
            position: relative;
            display: inline-block;
            transform-origin: center center;
            will-change: transform;
        }

        .map-image {
            display: block;
            max-width: 90vw;
            max-height: 85vh;
            object-fit: contain;
            pointer-events: none;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8);
            border: 1px solid var(--border-color);
        }

        /* Заблокированная интерактивная кнопка на карте */
        .map-trigger {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 12px 24px;
            background: rgba(11, 12, 14, 0.85);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .map-trigger:hover {
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%) scale(1.01);
        }

        .map-trigger span {
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-disabled);
            text-align: center;
            display: block;
        }

        /* Панели интерфейса (Минималистичные плашки без скруглений) */
        .ui-panel {
            position: absolute;
            top: 32px;
            left: 32px;
            z-index: 10;
            display: flex;
            gap: 8px;
            pointer-events: none;
        }

        .btn {
            pointer-events: auto;
            background: var(--panel-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 8px 18px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: var(--panel-bg-hover);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn-main {
            background: rgba(255, 255, 255, 0.95);
            color: #0b0c0e;
            border: none;
            font-weight: 600;
        }

        .btn-main:hover {
            background: #ffffff;
        }

        /* Всплывающее минималистичное уведомление */
        .toast {
            position: absolute;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(11, 12, 14, 0.9);
            border: 1px solid var(--border-color);
            padding: 12px 24px;
            font-size: 12px;
            letter-spacing: 0.5px;
            color: var(--text-color);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <!-- Уведомление о неготовности спавна -->
    <div id="mapToast" class="toast">Карта спавна ещё не полностью готова. Объект находится в разработке.</div>

    <!-- Экран 1 -->
    <div id="screen1" class="screen active">
        <div class="ui-panel">
            <button class="btn" onclick="resetView(1)">Сбросить</button>
        </div>
        
        <div class="scene" id="scene1">
            <div class="map-wrapper" id="wrapper1">
                <img src="https://i.ibb.co/PsyfT2WW/Screenshot-2026-06-14-032404.png" class="map-image" alt="Карта мира">
                <div class="map-trigger" onclick="showDevelopmentNotice(event)">
                    <span>Спавн в разработке</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Экран 2 (Зарезервирован на будущее) -->
    <div id="screen2" class="screen">
        <div class="ui-panel">
            <button class="btn btn-main" onclick="goToScreen1()">← Назад</button>
            <button class="btn" onclick="resetView(2)">Сбросить</button>
        </div>

        <div class="scene" id="scene2">
            <div class="map-wrapper" id="wrapper2">
                <img src="https://i.ibb.co/ch3G3rKY/Screenshot-2026-06-11-034611.png" class="map-image" alt="Карта спавна">
            </div>
        </div>
    </div>

    <script>
        const transforms = {
            1: { scale: 1, x: 0, y: 0 },
            2: { scale: 1, x: 0, y: 0 }
        };

        function initMapControls(id) {
            const scene = document.getElementById(`scene${id}`);
            const target = document.getElementById(`wrapper${id}`);
            const state = transforms[id];

            let isDragging = false;
            let startX, startY;

            function applyTransform() {
                target.style.transform = `translate(${state.x}px, ${state.y}px) scale(${state.scale})`;
            }

            scene.addEventListener('wheel', (e) => {
                e.preventDefault();
                const zoomFactor = 0.12;
                
                if (e.deltaY < 0) {
                    state.scale += zoomFactor;
                } else {
                    state.scale -= zoomFactor;
                }

                state.scale = Math.max(0.5, Math.min(5, state.scale));
                applyTransform();
            }, { passive: false });

            scene.addEventListener('mousedown', (e) => {
                if (e.target.closest('.ui-panel') || e.target.closest('.map-trigger')) return;

                isDragging = true;
                startX = e.clientX - state.x;
                startY = e.clientY - state.y;
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                state.x = e.clientX - startX;
                state.y = e.clientY - startY;
                applyTransform();
            });

            window.addEventListener('mouseup', () => {
                isDragging = false;
            });
        }

        // Показ сообщения о разработке
        let toastTimeout;
        function showDevelopmentNotice(event) {
            event.stopPropagation();
            const toast = document.getElementById('mapToast');
            
            toast.classList.add('show');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Функции переключения (Оставлены для будущей интеграции карты)
        function goToScreen2() {
            document.getElementById('screen1').classList.remove('active');
            document.getElementById('screen2').classList.add('active');
            resetView(2); 
        }

        function goToScreen1() {
            document.getElementById('screen2').classList.remove('active');
            document.getElementById('screen1').classList.add('active');
        }

        function resetView(id) {
            const state = transforms[id];
            const target = document.getElementById(`wrapper${id}`);
            state.scale = 1;
            state.x = 0;
            state.y = 0;
            target.style.transform = `translate(0px, 0px) scale(1)`;
        }

        initMapControls(1);
        initMapControls(2);
    </script>
</body>
</html>
