<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToadShield Wiki Map</title>
    <style>
        :root {
            --bg-color: #0c0d0f;
            --panel-bg: rgba(255, 255, 255, 0.07);
            --panel-bg-hover: rgba(255, 255, 255, 0.12);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-color: #ffffff;
            --trigger-bg: rgba(255, 255, 255, 0.08);
            --trigger-border: rgba(255, 255, 255, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            color: var(--text-color);
        }

        /* Экраны */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
        }

        .screen.active {
            display: block;
        }

        /* Главная сцена для зума */
        .scene {
            width: 100%;
            height: 100%;
            cursor: grab;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .scene:active {
            cursor: grabbing;
        }

        /* Обертка карты */
        .map-wrapper {
            position: relative;
            display: inline-block;
            transform-origin: center center;
            will-change: transform;
        }

        .map-image {
            display: block;
            max-width: 95vw;
            max-height: 90vh;
            object-fit: contain;
            pointer-events: none;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            border-radius: 4px;
        }

        /* Белая интерактивная зона (Вставка на карте) */
        .map-trigger {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 14px 28px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--trigger-border);
            border-radius: 6px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.25s ease;
            z-index: 5;
        }

        .map-trigger:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #ffffff;
            box-shadow: 0 8px 32px rgba(255, 255, 255, 0.1);
            transform: translate(-50%, -50%) scale(1.02);
        }

        .map-trigger span {
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #ffffff;
            text-align: center;
            display: block;
        }

        /* Панели интерфейса (Белые аккуратные вставки) */
        .ui-panel {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 10;
            display: flex;
            gap: 10px;
            pointer-events: none;
        }

        .btn {
            pointer-events: auto;
            background: var(--panel-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 10px 22px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: var(--panel-bg-hover);
            border-color: rgba(255, 255, 255, 0.4);
            color: #ffffff;
        }

        .btn-main {
            background: rgba(255, 255, 255, 0.9);
            color: #0c0d0f;
            border: none;
            font-weight: 600;
        }

        .btn-main:hover {
            background: #ffffff;
            box-shadow: 0 4px 20px rgba(255, 255, 255, 0.2);
        }

        .btn:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>

    <!-- Экран 1 -->
    <div id="screen1" class="screen active">
        <div class="ui-panel">
            <button class="btn" onclick="resetView(1)">Сбросить</button>
        </div>
        
        <div class="scene" id="scene1">
            <div class="map-wrapper" id="wrapper1">
                <img src="https://i.ibb.co/W4Q9G8MR/Chat-GPT-Image-12-2026-03-05-46.png" class="map-image" alt="Карта мира">
                <div class="map-trigger" onclick="goToScreen2(event)">
                    <span>Открыть карту спавна</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Экран 2 -->
    <div id="screen2" class="screen">
        <div class="ui-panel">
            <button class="btn btn-main" onclick="goToScreen1()">← Назад</button>
            <button class="btn" onclick="resetView(2)">Сбросить</button>
        </div>

        <div class="scene" id="scene2">
            <div class="map-wrapper" id="wrapper2">
                <img src="https://i.ibb.co/ch3G3rKY/Screenshot-2026-06-11-034611.png" class="map-image" alt="Карта спавна">
            </div>
        </div>
    </div>

    <script>
        const transforms = {
            1: { scale: 1, x: 0, y: 0 },
            2: { scale: 1, x: 0, y: 0 }
        };

        function initMapControls(id) {
            const scene = document.getElementById(`scene${id}`);
            const target = document.getElementById(`wrapper${id}`);
            const state = transforms[id];

            let isDragging = false;
            let startX, startY;

            function applyTransform() {
                target.style.transform = `translate(${state.x}px, ${state.y}px) scale(${state.scale})`;
            }

            scene.addEventListener('wheel', (e) => {
                e.preventDefault();
                const zoomFactor = 0.15;
                
                if (e.deltaY < 0) {
                    state.scale += zoomFactor;
                } else {
                    state.scale -= zoomFactor;
                }

                state.scale = Math.max(0.4, Math.min(6, state.scale));
                applyTransform();
            }, { passive: false });

            scene.addEventListener('mousedown', (e) => {
                if (e.target.closest('.ui-panel') || e.target.closest('.map-trigger')) return;

                isDragging = true;
                startX = e.clientX - state.x;
                startY = e.clientY - state.y;
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                state.x = e.clientX - startX;
                state.y = e.clientY - startY;
                applyTransform();
            });

            window.addEventListener('mouseup', () => {
                isDragging = false;
            });
        }

        function goToScreen2(event) {
            event.stopPropagation();
            document.getElementById('screen1').classList.remove('active');
            document.getElementById('screen2').classList.add('active');
            resetView(2); 
        }

        function goToScreen1() {
            document.getElementById('screen2').classList.remove('active');
            document.getElementById('screen1').classList.add('active');
        }

        function resetView(id) {
            const state = transforms[id];
            const target = document.getElementById(`wrapper${id}`);
            state.scale = 1;
            state.x = 0;
            state.y = 0;
            target.style.transform = `translate(0px, 0px) scale(1)`;
        }

        initMapControls(1);
        initMapControls(2);
    </script>
</body>
</html>
